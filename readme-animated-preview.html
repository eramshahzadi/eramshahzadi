<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>README Animated Preview</title>
<style>
body{margin:0;background:#0a0d1f;color:#fff;font-family:Arial,Helvetica,sans-serif;padding:24px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:28px;margin:0 0 18px}
.card{background:#10142d;border:1px solid #28336d;border-radius:18px;padding:20px;box-shadow:0 0 30px rgba(94,76,255,.15)}
img{width:100%;height:auto;display:block;border-radius:16px}
p{color:#a7b5e6}
code{background:#1b2147;padding:2px 8px;border-radius:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>GitHub README Animated Preview</h1>
  <p>This is the fixed SVG banner used at the top of <code>PROFILE_README.md</code>.</p>
  <div class="card">
    <img src="assets/github-profile-neon.svg" alt="README neon preview">
  </div>
</div>
</body>
</html>
